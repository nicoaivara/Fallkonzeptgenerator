<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ICD-10 Diagnosen – Design-Optionen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: "Inter", system-ui; background: #f5f7fa; color: #0f2847; }
    .container { display: grid; grid-template-columns: 300px 1fr; min-height: 100vh; }
    .sidebar { background: white; border-right: 1px solid #e0e4e8; padding: 24px 18px; overflow-y: auto; max-height: 100vh; }
    .sidebar h2 { font-size: 13px; font-weight: 700; margin: 0 0 16px; text-transform: uppercase; color: #5a6f85; }
    .sidebar button { display: block; width: 100%; padding: 10px 12px; margin-bottom: 6px; border: 1px solid transparent; background: transparent; border-radius: 8px; text-align: left; cursor: pointer; font-size: 13px; color: #5a6f85; transition: all 120ms; }
    .sidebar button:hover { background: #f0f4f8; color: #2c5aa0; }
    .sidebar button.active { background: #e8f0f9; color: #2c5aa0; font-weight: 600; border-color: #2c5aa0; }
    .main { padding: 40px 56px; overflow-y: auto; }
    .page-title { font-size: 26px; font-weight: 700; margin: 0 0 8px; color: #0f2847; }
    .page-desc { color: #5a6f85; margin: 0 0 32px; max-width: 700px; }
    .card { background: white; border: 1px solid #e0e4e8; border-radius: 10px; padding: 24px; margin-bottom: 28px; }
    .card h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; margin: 0 0 16px; color: #5a6f85; letter-spacing: 0.08em; }

    /* Button Styles - Specifier Options */
    .spec-button-row { display: flex; gap: 6px; }
    .spec-btn { padding: 6px 10px; border: 1px solid #cbd5e1; background: white; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 100ms; font-weight: 500; min-width: 40px; text-align: center; }
    .spec-btn:hover { border-color: #2c5aa0; background: #e8f0f9; }
    .spec-btn.active { background: #2c5aa0; color: white; border-color: #2c5aa0; }

    /* Option 1: Dropdown */
    .option-dropdown select { padding: 8px 12px; border: 1px solid #e0e4e8; border-radius: 6px; font-family: inherit; }

    /* Option 2: Radio Pills */
    .radio-pills { display: flex; gap: 8px; }
    .radio-pill { padding: 8px 14px; border: 1px solid #e0e4e8; background: white; border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 120ms; }
    .radio-pill:hover { border-color: #2c5aa0; }
    .radio-pill.active { background: #2c5aa0; color: white; border-color: #2c5aa0; }

    /* Option 3: Icon Buttons */
    .icon-btn { padding: 8px; border: 1px solid #e0e4e8; background: white; border-radius: 6px; font-size: 14px; cursor: pointer; transition: all 100ms; }
    .icon-btn:hover { border-color: #2c5aa0; background: #f0f4f8; }
    .icon-btn.active { background: #2c5aa0; color: white; border-color: #2c5aa0; }

    /* Sample ICD Rows */
    .icd-row { display: grid; grid-template-columns: 50px 100px 1fr auto; gap: 12px; align-items: center; padding: 12px; border: 1px solid #e0e4e8; border-radius: 8px; margin-bottom: 8px; }
    .icd-code { font-family: monospace; font-weight: 600; color: #2c5aa0; }
    .icd-label { color: #5a6f85; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    function IcdOptions() {
      const [active, setActive] = React.useState('option1');
      const [selected1, setSelected1] = React.useState('G');
      const [selected2, setSelected2] = React.useState('G');
      const [selected3, setSelected3] = React.useState('G');

      const sampleDiagnosis = { code: 'F33.1', label: 'Depressive Störung, rezidivierend, gegenwärtig mittelgradig' };
      const specifiers = ['G', 'V', 'Z', 'A'];
      const specLabels = { G: 'Gesichert', V: 'Verdacht', Z: 'Zustand nach', A: 'Ausschluss' };

      return (
        <div className="container">
          <div className="sidebar">
            <h2>ICD-10 Optionen</h2>
            {[
              { id: 'option1', name: '1. Button-Segmente (Alt)' },
              { id: 'option2', name: '2. Dropdown-Select' },
              { id: 'option3', name: '3. Radio Pills' },
              { id: 'option4', name: '4. Icon Buttons' },
            ].map(opt => (
              <button
                key={opt.id}
                className={active === opt.id ? 'active' : ''}
                onClick={() => setActive(opt.id)}
              >
                {opt.name}
              </button>
            ))}
          </div>

          <div className="main">
            <h1 className="page-title">ICD-10 Diagnosen</h1>
            <p className="page-desc">Verschiedene UI-Optionen für die Spezifizierer-Auswahl (G/V/Z/A) und Diagnose-Verwaltung.</p>

            {/* Option 1: Button-Segmente (aktuelle Lösung) */}
            {active === 'option1' && (
              <div className="card">
                <h3>Option 1: Button-Segmente (Aktuell)</h3>
                <div className="icd-row">
                  <div className="icd-code">{sampleDiagnosis.code}</div>
                  <div></div>
                  <div className="icd-label">{sampleDiagnosis.label}</div>
                  <div className="spec-button-row">
                    {specifiers.map(s => (
                      <button
                        key={s}
                        className={`spec-btn ${selected1 === s ? 'active' : ''}`}
                        onClick={() => setSelected1(s)}
                        title={specLabels[s]}
                      >
                        {s}
                      </button>
                    ))}
                  </div>
                </div>
                <p style={{ marginTop: 16, fontSize: 13, color: '#5a6f85' }}>
                  <strong>Nachteil:</strong> Kleine Buttons sind auf Mobilgeräten schwer zu treffen. G/V/Z/A sind keine aussagekräftigen Labels.
                </p>
              </div>
            )}

            {/* Option 2: Dropdown */}
            {active === 'option2' && (
              <div className="card">
                <h3>Option 2: Dropdown-Select</h3>
                <div className="icd-row">
                  <div className="icd-code">{sampleDiagnosis.code}</div>
                  <div></div>
                  <div className="icd-label">{sampleDiagnosis.label}</div>
                  <select value={selected2} onChange={e => setSelected2(e.target.value)} style={{ padding: '8px 12px', borderRadius: 6, border: '1px solid #e0e4e8', fontFamily: 'inherit' }}>
                    {specifiers.map(s => (
                      <option key={s} value={s}>{s} - {specLabels[s]}</option>
                    ))}
                  </select>
                </div>
                <p style={{ marginTop: 16, fontSize: 13, color: '#5a6f85' }}>
                  <strong>Vorteil:</strong> Kompakt, Labels sichtbar. <strong>Nachteil:</strong> Weniger visuell greifbar.
                </p>
              </div>
            )}

            {/* Option 3: Radio Pills */}
            {active === 'option3' && (
              <div className="card">
                <h3>Option 3: Radio Pills (Empfohlen)</h3>
                <div style={{ display: 'grid', gridTemplateColumns: 'auto 1fr', gap: 12, alignItems: 'center', padding: 12, background: '#f9fafb', borderRadius: 8 }}>
                  <div>
                    <div style={{ fontFamily: 'monospace', fontWeight: 600, color: '#2c5aa0' }}>{sampleDiagnosis.code}</div>
                  </div>
                  <div style={{ color: '#5a6f85' }}>{sampleDiagnosis.label}</div>
                  <div></div>
                  <div className="radio-pills">
                    {specifiers.map(s => (
                      <button
                        key={s}
                        className={`radio-pill ${selected3 === s ? 'active' : ''}`}
                        onClick={() => setSelected3(s)}
                        title={specLabels[s]}
                      >
                        {s}
                      </button>
                    ))}
                  </div>
                </div>
                <p style={{ marginTop: 16, fontSize: 13, color: '#5a6f85' }}>
                  <strong>Vorteil:</strong> Große Touch-Ziele, visuell klar. Radio-Button-Semantik ist intuitive. <strong>Optimal für mobile Geräte.</strong>
                </p>
              </div>
            )}

            {/* Option 4: Icon Buttons */}
            {active === 'option4' && (
              <div className="card">
                <h3>Option 4: Icon Buttons mit Tooltip</h3>
                <div style={{ display: 'grid', gridTemplateColumns: 'auto 1fr', gap: 12, alignItems: 'center', padding: 12, background: '#f9fafb', borderRadius: 8 }}>
                  <div>
                    <div style={{ fontFamily: 'monospace', fontWeight: 600, color: '#2c5aa0' }}>{sampleDiagnosis.code}</div>
                  </div>
                  <div style={{ color: '#5a6f85' }}>{sampleDiagnosis.label}</div>
                  <div></div>
                  <div className="radio-pills">
                    {[
                      { s: 'G', icon: '✓', label: 'Gesichert' },
                      { s: 'V', icon: '?', label: 'Verdacht' },
                      { s: 'Z', icon: '↻', label: 'Zustand nach' },
                      { s: 'A', icon: '✕', label: 'Ausschluss' },
                    ].map(item => (
                      <button
                        key={item.s}
                        className={`radio-pill ${selected3 === item.s ? 'active' : ''}`}
                        onClick={() => setSelected3(item.s)}
                        title={item.label}
                        style={{ fontSize: 16 }}
                      >
                        {item.icon}
                      </button>
                    ))}
                  </div>
                </div>
                <p style={{ marginTop: 16, fontSize: 13, color: '#5a6f85' }}>
                  <strong>Vorteil:</strong> Visuelle Icons sind schneller erkannt. <strong>Nachteil:</strong> Icons müssen gelernt werden.
                </p>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<IcdOptions />);
  </script>
</body>
</html>
